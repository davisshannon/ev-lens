name = "ev-lens"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Custom domain — requires ev-lens.com to be in Cloudflare DNS
routes = [{ pattern = "auth.ev-lens.com", custom_domain = true }]

[vars]
# TESLA_CLIENT_ID: set in Cloudflare dashboard as a secret, or here for dev
# BRIDGE_SECRET:   set in Cloudflare dashboard as a secret (must match backend SECRET_KEY)
# ALLOWED_ORIGINS: comma-separated list of allowed instance origins
#                  e.g. "http://localhost:8000,https://evlens.example.com"
#                  Set to "*" to allow any self-hosted instance (safe — all state is signed)
ALLOWED_ORIGINS = "*"
