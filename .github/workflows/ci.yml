name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: evlens_test
          POSTGRES_USER: evlens
          POSTGRES_PASSWORD: evlens
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://evlens:evlens@localhost:5432/evlens_test
        run: alembic upgrade head

      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://evlens:evlens@localhost:5432/evlens_test
          SECRET_KEY: ci-secret-key-not-for-production
          ENCRYPTION_KEY: ci-encryption-key-32-bytes-long!!
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
